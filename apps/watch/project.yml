name: KanjiLearnWatch

options:
  deploymentTarget:
    watchOS: "10.0"
  xcodeVersion: "16"
  generateEmptyDirectories: false
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"

configs:
  Debug: debug
  Release: release

targets:

  # ── Main Watch App ──────────────────────────────────────────────────────────
  KanjiLearnWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"

    sources:
      - path: KanjiLearnWatch
        excludes:
          - "**/*.entitlements"
          - "**/*.plist"

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rdennis.kanjilearn2.watchkitapp
        INFOPLIST_FILE: KanjiLearnWatch/Info.plist
        CODE_SIGN_ENTITLEMENTS: KanjiLearnWatch/KanjiLearnWatch.entitlements
        SKIP_INSTALL: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: JN43UP9MQL
        CODE_SIGN_STYLE: Automatic

    dependencies:
      - sdk: WatchConnectivity.framework
        weak: true
